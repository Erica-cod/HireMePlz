global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "hiremeplz-backend"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: backend

  # Docker 守护进程指标（需在 Docker daemon.json 中开启 metrics）
  # - job_name: "docker"
  #   static_configs:
  #     - targets: ["host.docker.internal:9323"]

  # Node Exporter（如需主机级别 CPU/内存/磁盘指标）
  # - job_name: "node-exporter"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
