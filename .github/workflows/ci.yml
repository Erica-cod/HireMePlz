name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hiremeplz
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hiremeplz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hiremeplz?schema=public
      JWT_SECRET: ci-secret-for-build
      NEXT_PUBLIC_API_URL: http://localhost:4000
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push Prisma schema
        run: npm run db:push

      - name: Type check
        run: npm run lint

      - name: Build all packages
        run: npm run build

  build-and-deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.SWARM_HOST != '' && secrets.SWARM_USER != '' && secrets.SWARM_SSH_KEY != '' && secrets.DEPLOY_PATH != '' && secrets.DEPLOY_DOMAIN != '' && secrets.LETSENCRYPT_EMAIL != ''
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/hiremeplz-backend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/hiremeplz-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.DEPLOY_DOMAIN }}
          tags: |
            ${{ env.IMAGE_REGISTRY }}/hiremeplz-frontend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/hiremeplz-frontend:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/hiremeplz-worker:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/hiremeplz-worker:latest

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          source: "deploy/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy stack on Swarm manager
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
          MONITORING_DOMAIN: ${{ secrets.MONITORING_DOMAIN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          JOB_ALERT_MIN_SCORE: ${{ secrets.JOB_ALERT_MIN_SCORE }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          ALERT_EMAIL_SMARTHOST: ${{ secrets.ALERT_EMAIL_SMARTHOST }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_AUTH_USERNAME: ${{ secrets.ALERT_EMAIL_AUTH_USERNAME }}
          ALERT_SLACK_CHANNEL: ${{ secrets.ALERT_SLACK_CHANNEL }}
          SWARM_POSTGRES_PASSWORD: ${{ secrets.SWARM_POSTGRES_PASSWORD }}
          SWARM_DATABASE_URL: ${{ secrets.SWARM_DATABASE_URL }}
          SWARM_JWT_SECRET: ${{ secrets.SWARM_JWT_SECRET }}
          SWARM_OPENAI_API_KEY: ${{ secrets.SWARM_OPENAI_API_KEY }}
          SWARM_JSEARCH_API_KEY: ${{ secrets.SWARM_JSEARCH_API_KEY }}
          SWARM_ADZUNA_APP_ID: ${{ secrets.SWARM_ADZUNA_APP_ID }}
          SWARM_ADZUNA_APP_KEY: ${{ secrets.SWARM_ADZUNA_APP_KEY }}
          SWARM_SENDGRID_API_KEY: ${{ secrets.SWARM_SENDGRID_API_KEY }}
          SWARM_SENDGRID_FROM_EMAIL: ${{ secrets.SWARM_SENDGRID_FROM_EMAIL }}
          SWARM_GRAFANA_ADMIN_PASSWORD: ${{ secrets.SWARM_GRAFANA_ADMIN_PASSWORD }}
          SWARM_ALERT_EMAIL_PASSWORD: ${{ secrets.SWARM_ALERT_EMAIL_PASSWORD }}
          SWARM_ALERT_SLACK_WEBHOOK: ${{ secrets.SWARM_ALERT_SLACK_WEBHOOK }}
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          envs: DEPLOY_PATH,IMAGE_REGISTRY,IMAGE_TAG,DEPLOY_DOMAIN,MONITORING_DOMAIN,LETSENCRYPT_EMAIL,OPENAI_MODEL,JOB_ALERT_MIN_SCORE,GRAFANA_ADMIN_USER,ALERT_EMAIL_SMARTHOST,ALERT_EMAIL_FROM,ALERT_EMAIL_TO,ALERT_EMAIL_AUTH_USERNAME,ALERT_SLACK_CHANNEL,SWARM_POSTGRES_PASSWORD,SWARM_DATABASE_URL,SWARM_JWT_SECRET,SWARM_OPENAI_API_KEY,SWARM_JSEARCH_API_KEY,SWARM_ADZUNA_APP_ID,SWARM_ADZUNA_APP_KEY,SWARM_SENDGRID_API_KEY,SWARM_SENDGRID_FROM_EMAIL,SWARM_GRAFANA_ADMIN_PASSWORD,SWARM_ALERT_EMAIL_PASSWORD,SWARM_ALERT_SLACK_WEBHOOK
          script: |
            set -eu
            mkdir -p "${DEPLOY_PATH}/deploy"

            if ! docker info >/dev/null 2>&1; then
              echo "Docker is not available on remote host."
              exit 1
            fi

            if ! docker info --format '{{.Swarm.LocalNodeState}}' | grep -q 'active'; then
              docker swarm init
            fi

            ensure_secret() {
              name="$1"
              value="$2"
              if [ -z "$value" ]; then
                return 0
              fi
              if docker secret inspect "$name" >/dev/null 2>&1; then
                return 0
              fi
              printf "%s" "$value" | docker secret create "$name" -
            }

            ensure_secret "postgres_password" "${SWARM_POSTGRES_PASSWORD}"
            ensure_secret "database_url" "${SWARM_DATABASE_URL}"
            ensure_secret "jwt_secret" "${SWARM_JWT_SECRET}"
            ensure_secret "openai_api_key" "${SWARM_OPENAI_API_KEY}"
            ensure_secret "jsearch_api_key" "${SWARM_JSEARCH_API_KEY}"
            ensure_secret "adzuna_app_id" "${SWARM_ADZUNA_APP_ID}"
            ensure_secret "adzuna_app_key" "${SWARM_ADZUNA_APP_KEY}"
            ensure_secret "sendgrid_api_key" "${SWARM_SENDGRID_API_KEY}"
            ensure_secret "sendgrid_from_email" "${SWARM_SENDGRID_FROM_EMAIL}"
            ensure_secret "grafana_admin_password" "${SWARM_GRAFANA_ADMIN_PASSWORD:-admin}"
            ensure_secret "alert_email_password" "${SWARM_ALERT_EMAIL_PASSWORD:-changeme}"
            ensure_secret "alert_slack_webhook" "${SWARM_ALERT_SLACK_WEBHOOK:-https://hooks.slack.com/services/T000/B000/PLACEHOLDER}"

            EFFECTIVE_MONITORING_DOMAIN="${MONITORING_DOMAIN:-monitor.${DEPLOY_DOMAIN}}"

            cat > "${DEPLOY_PATH}/deploy/swarm.env" <<EOF
            IMAGE_REGISTRY=${IMAGE_REGISTRY}
            IMAGE_TAG=${IMAGE_TAG}
            DOMAIN=${DEPLOY_DOMAIN}
            MONITORING_DOMAIN=${EFFECTIVE_MONITORING_DOMAIN}
            LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
            OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
            JOB_ALERT_MIN_SCORE=${JOB_ALERT_MIN_SCORE:-0.75}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
            ALERT_EMAIL_SMARTHOST=${ALERT_EMAIL_SMARTHOST:-smtp.sendgrid.net:587}
            ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM:-alerts@hiremeplz.local}
            ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-alerts@hiremeplz.local}
            ALERT_EMAIL_AUTH_USERNAME=${ALERT_EMAIL_AUTH_USERNAME:-apikey}
            ALERT_SLACK_CHANNEL=${ALERT_SLACK_CHANNEL:-#hiremeplz-alerts}
            EOF

            cd "${DEPLOY_PATH}"
            ./deploy/deploy-stack.sh ./deploy/swarm.env
