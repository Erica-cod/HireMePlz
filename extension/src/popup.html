<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f9fafb;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .logged-in { display: none; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .field input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { background: white; color: #dc2626; border: 1px solid #fecaca; margin-top: 8px; }
    .btn-danger:hover { background: #fef2f2; }
    .msg { font-size: 12px; margin-top: 8px; padding: 6px 8px; border-radius: 6px; }
    .msg-error { background: #fef2f2; color: #dc2626; }
    .msg-success { background: #f0fdf4; color: #16a34a; }
    .user-info {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .user-info p { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .user-info .email { font-size: 14px; font-weight: 500; color: #1f2937; }
    .settings {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .settings h3 { font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .settings input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
    }
    .settings input:focus { border-color: #2563eb; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; margin-top: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.green { background: #22c55e; }
    .status-dot.red { background: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="HireMePlz" />
    <h1>HireMePlz</h1>
  </div>

  <div class="content">
    <div class="settings">
      <h3>API Server</h3>
      <input type="text" id="api-url" placeholder="http://localhost:4000" />
      <div class="status" id="server-status"></div>
      <button class="btn btn-primary" id="save-settings-btn">Save Settings</button>
      <div id="settings-msg"></div>
    </div>

    <!-- Login Form -->
    <div id="login-view">
      <div class="field">
        <label id="name-label" style="display: none;">Name</label>
        <input type="text" id="name" placeholder="Your name" style="display: none;" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" />
      </div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div id="login-msg"></div>
      <div class="msg" style="background: transparent; padding: 0; margin-top: 10px;">
        <button
          type="button"
          id="auth-toggle-btn"
          style="border: none; background: none; color: #2563eb; cursor: pointer; padding: 0;"
        >
          Create account
        </button>
      </div>
    </div>

    <!-- Logged In View -->
    <div id="logged-in-view" class="logged-in">
      <div class="user-info">
        <div class="email" id="user-email"></div>
        <p>Logged in</p>
      </div>
      <button class="btn btn-danger" id="logout-btn">Sign Out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
