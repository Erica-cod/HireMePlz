<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      color: #1f2937;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .content { padding: 16px; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .status-bar.connected { background: #ecfdf5; color: #065f46; }
    .status-bar.disconnected { background: #fef2f2; color: #991b1b; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .dot { background: #10b981; }
    .disconnected .dot { background: #ef4444; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }
    .field { margin-bottom: 12px; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary {
      background: white; color: #374151;
      border: 1px solid #d1d5db;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #f3f4f6; }
    .error {
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
    .section-title {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .divider {
      display: flex; align-items: center; gap: 8px;
      margin: 14px 0;
      font-size: 11px; color: #9ca3af;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e5e7eb;
    }
    #logged-in-view { display: none; }
    #logged-in-view .user-email {
      font-size: 13px; font-weight: 500; word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HireMePlz Autofill</h1>
    <p>Smart job application assistant</p>
  </div>

  <div class="content">
    <div id="status-bar" class="status-bar disconnected">
      <span class="dot"></span>
      <span id="status-text">Not connected</span>
    </div>

    <!-- Login View -->
    <div id="login-view">
      <div class="section-title">Login to your account</div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password">
      </div>
      <div id="login-error" class="error"></div>
      <button id="login-btn" class="btn btn-primary">Login</button>

      <div class="divider">or</div>

      <div class="section-title">Manual token</div>
      <div class="field">
        <label for="api-url">API URL</label>
        <input type="url" id="api-url" placeholder="http://localhost:4000">
      </div>
      <div class="field">
        <label for="token">JWT Token</label>
        <input type="text" id="token" placeholder="Paste your token here">
      </div>
      <button id="save-btn" class="btn btn-secondary">Save Token</button>
    </div>

    <!-- Logged In View -->
    <div id="logged-in-view">
      <div class="section-title">Logged in as</div>
      <p class="user-email" id="user-email"></p>
      <div style="margin-top: 4px; font-size: 11px; color: #6b7280;">
        API: <span id="display-api-url"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary" style="margin-top: 14px;">Logout</button>
    </div>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
