services:
  postgres:
    image: postgres:16-alpine
    container_name: hiremeplz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hiremeplz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hiremeplz-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hiremeplz?schema=public
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: hiremeplz-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
    ports:
      - "3000:3000"

  worker:
    build:
      context: ./worker
    container_name: hiremeplz-worker
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hiremeplz?schema=public

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: hiremeplz-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hiremeplz-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--config.expand-env"
    environment:
      ALERT_EMAIL_SMARTHOST: ${ALERT_EMAIL_SMARTHOST:-smtp.sendgrid.net:587}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-alerts@hiremeplz.local}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-alerts@hiremeplz.local}
      ALERT_EMAIL_AUTH_USERNAME: ${ALERT_EMAIL_AUTH_USERNAME:-apikey}
      ALERT_EMAIL_PASSWORD: ${ALERT_EMAIL_PASSWORD:-changeme}
      ALERT_SLACK_CHANNEL: ${ALERT_SLACK_CHANNEL:-#hiremeplz-alerts}
      ALERT_SLACK_WEBHOOK: ${ALERT_SLACK_WEBHOOK:-https://hooks.slack.com/services/T000/B000/PLACEHOLDER}
    volumes:
      - ./deploy/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: hiremeplz-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8081:8080"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: hiremeplz-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: hiremeplz-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
