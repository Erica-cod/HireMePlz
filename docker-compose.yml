services:
  postgres:
    image: postgres:16-alpine
    container_name: hiremeplz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hiremeplz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hiremeplz-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hiremeplz?schema=public
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: hiremeplz-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

  worker:
    build:
      context: ./worker
    container_name: hiremeplz-worker
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hiremeplz?schema=public

volumes:
  postgres_data:
