groups:
  - name: hiremeplz-alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend is unreachable"
          description: "Prometheus cannot scrape HireMePlz backend metrics."

      - alert: HighBackendP95Latency
        expr: histogram_quantile(0.95, sum(rate(hiremeplz_http_request_duration_seconds_bucket[5m])) by (le)) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High backend p95 latency"
          description: "Backend p95 latency stayed above 1.5s for 10 minutes."

      - alert: High5xxRate
        expr: (sum(rate(hiremeplz_http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(hiremeplz_http_requests_total[5m])), 0.001)) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend 5xx rate is high"
          description: "More than 5% of backend requests are returning 5xx."

      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter target down"
          description: "Prometheus cannot scrape node-exporter on at least one node."

      - alert: CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cAdvisor target down"
          description: "Prometheus cannot scrape cAdvisor on at least one node."
