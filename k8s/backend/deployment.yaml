apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: hiremeplz
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: db-migrate
          image: ghcr.io/erica-cod/hiremeplz/backend:latest
          command: ["npx", "prisma", "db", "push", "--skip-generate"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hiremeplz-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres-svc:5432/hiremeplz?schema=public"
      containers:
        - name: backend
          image: ghcr.io/erica-cod/hiremeplz/backend:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: hiremeplz-config
            - secretRef:
                name: hiremeplz-secret
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hiremeplz-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres-svc:5432/hiremeplz?schema=public"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
