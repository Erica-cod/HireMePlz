apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: hiremeplz
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki-svc:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["hiremeplz"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
        pipeline_stages:
          - docker: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: hiremeplz
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.4.2
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: run
              mountPath: /run/promtail
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
        - name: run
          hostPath:
            path: /run/promtail
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: hiremeplz
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hiremeplz-promtail
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: hiremeplz
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hiremeplz-promtail
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: hiremeplz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hiremeplz-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: hiremeplz
