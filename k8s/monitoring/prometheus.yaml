apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "hiremeplz-backend"
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ["hiremeplz"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
        metrics_path: /metrics
        scrape_interval: 10s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
data:
  alert-rules.yml: |
    groups:
      - name: hiremeplz-k8s
        rules:
          - alert: PodCpuHigh
            expr: |
              sum(rate(container_cpu_usage_seconds_total{namespace="hiremeplz"}[5m])) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="hiremeplz", resource="cpu"}) by (pod)
              * 100 > 80
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} CPU 使用率超过 80%"
              description: "CPU 使用率 {{ $value | printf \"%.1f\" }}%"

          - alert: PodMemoryHigh
            expr: |
              sum(container_memory_working_set_bytes{namespace="hiremeplz"}) by (pod)
              /
              sum(kube_pod_container_resource_limits{namespace="hiremeplz", resource="memory"}) by (pod)
              * 100 > 85
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} 内存使用率超过 85%"
              description: "内存使用率 {{ $value | printf \"%.1f\" }}%"

          - alert: PodRestartingTooOften
            expr: increase(kube_pod_container_status_restarts_total{namespace="hiremeplz"}[1h]) > 3
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} 在 1 小时内重启超过 3 次"
              description: "容器 {{ $labels.container }} 重启次数增长 {{ $value }}"

          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace="hiremeplz", condition="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} 持续 5 分钟未就绪"

      - name: hiremeplz-app
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(hiremeplz_http_requests_total{status_code=~"5.."}[5m]))
              /
              sum(rate(hiremeplz_http_requests_total[5m]))
              * 100 > 5
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "5xx 错误率超过 5%"
              description: "过去 5 分钟的 5xx 错误率为 {{ $value | printf \"%.2f\" }}%"

          - alert: HighRequestLatency
            expr: |
              histogram_quantile(0.95,
                sum(rate(hiremeplz_http_request_duration_seconds_bucket[5m])) by (le)
              ) > 2
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "P95 请求延迟超过 2 秒"
              description: "当前 P95 延迟 {{ $value | printf \"%.2f\" }}s"

          - alert: QueueBacklog
            expr: hiremeplz_queue_waiting > 50
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "队列 {{ $labels.queue }} 积压过多"

          - alert: HeapMemoryHigh
            expr: hiremeplz_nodejs_heap_size_used_bytes / hiremeplz_nodejs_heap_size_total_bytes * 100 > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "V8 堆内存使用率超过 90%"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-alert-rules
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hiremeplz-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hiremeplz-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: hiremeplz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hiremeplz-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: hiremeplz
