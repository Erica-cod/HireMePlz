apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: hiremeplz
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: hiremeplz
data:
  hiremeplz-overview.json: |
    {
      "title": "HireMePlz — Overview",
      "uid": "hiremeplz-overview",
      "version": 1,
      "schemaVersion": 38,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Request Rate (req/s)",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{"color":"green","value":null},{"color":"yellow","value":10},{"color":"red","value":50}] },
              "unit": "reqps", "decimals": 2
            }
          },
          "targets": [{
            "expr": "sum(rate(hiremeplz_http_requests_total[1m]))",
            "legendFormat": "RPS"
          }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "P95 Latency",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{"color":"green","value":null},{"color":"yellow","value":0.5},{"color":"red","value":2}] },
              "unit": "s", "decimals": 3
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(hiremeplz_http_request_duration_seconds_bucket[5m])) by (le))",
            "legendFormat": "P95"
          }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error Rate",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":5}] },
              "unit": "percent", "decimals": 2
            }
          },
          "targets": [{
            "expr": "sum(rate(hiremeplz_http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(hiremeplz_http_requests_total[5m])) * 100",
            "legendFormat": "5xx %"
          }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "In-Flight Requests",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{"color":"green","value":null},{"color":"yellow","value":20},{"color":"red","value":100}] },
              "unit": "short"
            }
          },
          "targets": [{
            "expr": "hiremeplz_http_requests_in_flight",
            "legendFormat": "In-Flight"
          }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "HTTP Request Rate by Route",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(rate(hiremeplz_http_requests_total[1m])) by (route, method)",
            "legendFormat": "{{method}} {{route}}"
          }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Request Latency Percentiles",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(hiremeplz_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(hiremeplz_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(hiremeplz_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P99"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Node.js Heap Memory",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 7 },
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "hiremeplz_nodejs_heap_size_used_bytes",
              "legendFormat": "Heap Used"
            },
            {
              "expr": "hiremeplz_nodejs_heap_size_total_bytes",
              "legendFormat": "Heap Total"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Event Loop Lag",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 7 },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "targets": [{
            "expr": "rate(hiremeplz_nodejs_eventloop_lag_seconds_sum[1m])",
            "legendFormat": "Event Loop Lag"
          }]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "BullMQ Queue Depth",
          "gridPos": { "x": 0, "y": 19, "w": 12, "h": 7 },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "hiremeplz_queue_waiting",
              "legendFormat": "{{queue}} — waiting"
            },
            {
              "expr": "hiremeplz_queue_active",
              "legendFormat": "{{queue}} — active"
            },
            {
              "expr": "hiremeplz_queue_failed",
              "legendFormat": "{{queue}} — failed"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "HTTP Requests Total (cumulative)",
          "gridPos": { "x": 12, "y": 19, "w": 12, "h": 7 },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(hiremeplz_http_requests_total) by (status_code)",
            "legendFormat": "HTTP {{status_code}}"
          }]
        }
      ]
    }

  hiremeplz-logs.json: |
    {
      "title": "HireMePlz — Logs",
      "uid": "hiremeplz-logs",
      "version": 1,
      "schemaVersion": 38,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Backend Logs",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 20 },
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [{
            "datasource": { "type": "loki" },
            "expr": "{namespace=\"hiremeplz\", app_kubernetes_io_name=~\"backend|worker|worker-llm\"} | json",
            "legendFormat": ""
          }]
        }
      ]
    }
