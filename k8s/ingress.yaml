apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hiremeplz-ingress
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # 前端: hiremeplz.example.com
    - host: hiremeplz.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
    # 后端 API: api.hiremeplz.example.com
    - host: api.hiremeplz.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 4000
  # 生产环境取消注释并配置 TLS
  # tls:
  #   - hosts:
  #       - hiremeplz.example.com
  #       - api.hiremeplz.example.com
  #     secretName: hiremeplz-tls
