# Allow cert-manager ACME HTTP-01 solver pods to receive traffic from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8089
---
# Default deny all ingress traffic, then allow selectively
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# frontend: only allow traffic from Ingress Controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
# backend: allow traffic from Ingress Controller, frontend, and Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 4000
---
# postgres: only allow access from backend, worker, worker-llm
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker-llm
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres-backup
      ports:
        - protocol: TCP
          port: 5432
---
# redis: only allow access from backend, worker, worker-llm
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker-llm
