apiVersion: v1
kind: ConfigMap
metadata:
  name: hiremeplz-config
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
data:
  PORT: "4000"
  OPENAI_MODEL: "gpt-4o-mini"
  WORKER_POLL_INTERVAL_MS: "600000"
  JOBSPY_FETCH_COMMAND: "python scripts/jobspy_fetch.py"
  LLM_WORKER_CONCURRENCY: "5"
  LLM_JOB_TIMEOUT_MS: "30000"
  NEXT_PUBLIC_API_URL: "https://api.hiremeplz.example.com"
  EXTENSION_API_URL: "https://api.hiremeplz.example.com"
  REDIS_URL: "redis://redis-svc:6379"
