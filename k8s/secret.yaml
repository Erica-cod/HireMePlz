apiVersion: v1
kind: Secret
metadata:
  name: hiremeplz-secret
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
type: Opaque
stringData:
  # ========== Replace with real values before deployment ==========
  POSTGRES_PASSWORD: "replace-me-postgres-password"
  JWT_SECRET: "replace-me-jwt-secret-at-least-8-chars"
  OPENAI_API_KEY: ""
  JSEARCH_API_KEY: ""
  ADZUNA_APP_ID: ""
  ADZUNA_APP_KEY: ""
  SENDGRID_API_KEY: ""
  # DigitalOcean Spaces (for database backups)
  DO_SPACES_KEY: "replace-me-spaces-access-key"
  DO_SPACES_SECRET: "replace-me-spaces-secret-key"
  DO_SPACES_BUCKET: "replace-me-bucket-name"
  DO_SPACES_REGION: "nyc3"  # e.g. nyc3, sgp1, ams3, tor1
