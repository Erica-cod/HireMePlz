# Ensure at least 1 pod remains available during rolling updates / node maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: hiremeplz
  labels:
    app.kubernetes.io/part-of: hiremeplz
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
